   <main>
    
<section id="contact" class="py-5">
    <div class="container" style="max-width: 600px;">
        <h1 class="text-center mb-4">Get In Touch</h1>
        <p class="text-center text-muted mb-5">Have a project in mind? Let's work together.</p>
        <form>
            <div class="mb-3">
                <label for="name" class="form-label">Your Name</label>
                <input type="text" class="form-control" id="name" placeholder="John Doe">
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" placeholder="you@example.com">
                <div id="emailHelp" class="form-text">I'll never share your email.</div>
            </div>
            <div class="mb-3">
                <label for="message" class="form-label">Message</label>
                <textarea class="form-control" id="message" rows="4" placeholder="Tell me about your project..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100 submitBtm">Send Message</button>
        </form>
    </div>
</section>
